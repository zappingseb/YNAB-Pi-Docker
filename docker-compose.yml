version: "3"

x-comdirect-service: &comdirect-service
 build:
   context: ./comdirect_api
x-kontist-service: &kontist-service
 build:
   context: ./kontistYNAB


services:
  webapp:
    build: ./webapp
    ports:
      - "80:80"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    env_file:
     - "${CONFIG_PATH}/.env"

  backend:
    <<: *comdirect-service
    ports:
      - "5000:80"
    volumes:
      - "${CONFIG_PATH}:/config"

  comdirect_liv:
    <<: *comdirect-service
    ports:
      - "5001:80"
    volumes:
      - "${CONFIG_PATH}/comdirectLiv:/config"
  
  kontist_sebastian:
    <<: *kontist-service
    ports:
      - "5002:80"
    volumes:
      - "${CONFIG_PATH}/kontistSebastian/.env:/app/.env"
  

  kontist_liv:
    <<: *kontist-service
    ports:
      - "5003:80"
    volumes:
      - "${CONFIG_PATH}/kontistLiv/.env:/app/.env"

  comdirect_sebastian:
    <<: *comdirect-service
    ports:
      - "5004:80"
    volumes:
      - "${CONFIG_PATH}/comdirectSebastian:/config"
